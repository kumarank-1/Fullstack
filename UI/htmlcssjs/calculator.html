<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Complete Scientific Calculator</title>
  <style>
    :root{
      --bg:#0f172a;
      --panel:#111827;
      --panel2:#1f2937;
      --txt:#e5e7eb;
      --muted:#9ca3af;
      --num:#374151;
      --op:#2563eb;
      --fn:#7c3aed;
      --warn:#dc2626;
      --ok:#059669;
      --shadow:0 12px 28px rgba(0,0,0,.35);
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      background: radial-gradient(1200px 700px at 20% 10%, #1e293b 0%, transparent 60%),
                  radial-gradient(1000px 600px at 90% 90%, #0ea5e9 0%, transparent 50%),
                  var(--bg);
      color:var(--txt);
      padding:16px;
    }
    .calc{
      width:min(950px,98vw);
      background:linear-gradient(180deg,#0b1220,#0b1020);
      border:1px solid #243244;
      border-radius:18px;
      box-shadow:var(--shadow);
      overflow:hidden;
    }
    .top{
      display:grid;
      grid-template-columns:1fr 270px;
      gap:0;
    }
    .main{
      padding:16px;
      border-right:1px solid #243244;
    }
    .history{
      background:#0b1322;
      padding:14px;
      max-height:100%;
      overflow:auto;
    }
    .history h3{
      margin:0 0 10px;
      font-size:.95rem;
      color:var(--muted);
      font-weight:600;
    }
    .history-list{
      display:flex;
      flex-direction:column;
      gap:8px;
      font-size:.9rem;
    }
    .h-item{
      background:#0f1a2d;
      border:1px solid #1f2a3e;
      border-radius:10px;
      padding:8px 10px;
      cursor:pointer;
    }
    .h-item:hover{border-color:#34527a}
    .display-wrap{
      background:var(--panel);
      border:1px solid #253244;
      border-radius:12px;
      padding:12px;
      margin-bottom:12px;
    }
    .expr{
      min-height:24px;
      font-size:.95rem;
      color:var(--muted);
      text-align:right;
      word-break:break-all;
    }
    .display{
      width:100%;
      border:none;
      outline:none;
      background:transparent;
      color:var(--txt);
      font-size:2rem;
      text-align:right;
      margin-top:6px;
    }
    .toolbar{
      display:flex;
      justify-content:space-between;
      gap:10px;
      margin-bottom:12px;
      flex-wrap:wrap;
    }
    .mini-group{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }
    .mini{
      border:1px solid #2a3950;
      background:#132036;
      color:#cbd5e1;
      border-radius:8px;
      padding:6px 10px;
      font-size:.82rem;
      cursor:pointer;
    }
    .mini.active{
      background:var(--ok);
      border-color:#0b8f66;
      color:white;
    }

    .keys{
      display:grid;
      grid-template-columns:repeat(8,1fr);
      gap:8px;
    }
    button{
      border:none;
      border-radius:10px;
      padding:11px 8px;
      font-size:.95rem;
      font-weight:600;
      color:var(--txt);
      background:var(--num);
      cursor:pointer;
      transition:.14s ease;
      user-select:none;
    }
    button:hover{filter:brightness(1.1)}
    button:active{transform:translateY(1px) scale(.99)}
    .op{background:var(--op)}
    .fn{background:var(--fn)}
    .danger{background:var(--warn)}
    .equal{background:var(--ok)}
    .span-2{grid-column:span 2}
    .footer{
      padding:10px 16px 14px;
      color:var(--muted);
      font-size:.8rem;
      border-top:1px solid #243244;
    }
    @media (max-width:860px){
      .top{grid-template-columns:1fr}
      .main{border-right:none;border-bottom:1px solid #243244}
      .keys{grid-template-columns:repeat(6,1fr)}
    }
    @media (max-width:560px){
      .keys{grid-template-columns:repeat(5,1fr)}
      .display{font-size:1.7rem}
    }
  </style>
</head>
<body>
  <div class="calc">
    <div class="top">
      <section class="main">
        <div class="display-wrap">
          <div class="expr" id="exprView"></div>
          <input id="display" class="display" value="0" readonly />
        </div>

        <div class="toolbar">
          <div class="mini-group">
            <button class="mini" id="degBtn">DEG</button>
            <button class="mini" id="radBtn">RAD</button>
          </div>
          <div class="mini-group">
            <button class="mini" data-action="mc">MC</button>
            <button class="mini" data-action="mr">MR</button>
            <button class="mini" data-action="mplus">M+</button>
            <button class="mini" data-action="mminus">M-</button>
          </div>
        </div>

        <div class="keys" id="keys">
          <!-- Row 1 -->
          <button class="fn" data-fn="sin">sin</button>
          <button class="fn" data-fn="cos">cos</button>
          <button class="fn" data-fn="tan">tan</button>
          <button class="fn" data-fn="asin">asin</button>
          <button class="fn" data-fn="acos">acos</button>
          <button class="fn" data-fn="atan">atan</button>
          <button class="danger" data-action="clear">AC</button>
          <button class="danger" data-action="del">DEL</button>

          <!-- Row 2 -->
          <button class="fn" data-fn="ln">ln</button>
          <button class="fn" data-fn="log">log</button>
          <button class="fn" data-fn="sqrt">√</button>
          <button class="fn" data-fn="square">x²</button>
          <button class="fn" data-op="^">xʸ</button>
          <button class="fn" data-fn="fact">x!</button>
          <button class="fn" data-fn="pi">π</button>
          <button class="fn" data-fn="e">e</button>

          <!-- Row 3 -->
          <button data-char="(">(</button>
          <button data-char=")">)</button>
          <button data-char="%">%</button>
          <button data-op="mod">mod</button>
          <button data-fn="rand">Rand</button>
          <button data-op="/">÷</button>
          <button data-op="*">×</button>
          <button data-op="-">−</button>

          <!-- Row 4 -->
          <button data-char="7">7</button>
          <button data-char="8">8</button>
          <button data-char="9">9</button>
          <button data-op="+">+</button>
          <button data-fn="neg">±</button>
          <button data-char=".">.</button>
          <button data-char="0">0</button>
          <button class="equal" data-action="equals">=</button>

          <!-- Row 5 -->
          <button data-char="4">4</button>
          <button data-char="5">5</button>
          <button data-char="6">6</button>
          <button data-char="1">1</button>
          <button data-char="2">2</button>
          <button data-char="3">3</button>
          <button class="span-2" data-action="ans">ANS</button>
        </div>
      </section>

      <aside class="history">
        <h3>History</h3>
        <div id="historyList" class="history-list"></div>
      </aside>
    </div>
    <div class="footer">Keyboard: numbers, + - * / ^ % ( ), Enter, Backspace, Esc</div>
  </div>

  <script>
    const display = document.getElementById("display");
    const exprView = document.getElementById("exprView");
    const keys = document.getElementById("keys");
    const historyList = document.getElementById("historyList");
    const degBtn = document.getElementById("degBtn");
    const radBtn = document.getElementById("radBtn");

    let expr = "";
    let lastAns = 0;
    let memory = 0;
    let angleMode = "DEG";
    let history = [];

    function refreshModeUI() {
      degBtn.classList.toggle("active", angleMode === "DEG");
      radBtn.classList.toggle("active", angleMode === "RAD");
    }
    refreshModeUI();

    degBtn.onclick = () => { angleMode = "DEG"; refreshModeUI(); };
    radBtn.onclick = () => { angleMode = "RAD"; refreshModeUI(); };

    function setDisplay(value) {
      display.value = String(value);
    }

    function addToExpr(str) {
      if (expr === "0" && /\d/.test(str)) expr = str;
      else expr += str;
      exprView.textContent = expr;
      setDisplay(expr || "0");
    }

    function clearAll() {
      expr = "";
      exprView.textContent = "";
      setDisplay("0");
    }

    function delOne() {
      expr = expr.slice(0, -1);
      exprView.textContent = expr;
      setDisplay(expr || "0");
    }

    function factorial(n) {
      if (!Number.isInteger(n) || n < 0) throw new Error("Factorial only for non-negative integers");
      if (n > 170) throw new Error("Number too large");
      let res = 1;
      for (let i = 2; i <= n; i++) res *= i;
      return res;
    }

    function toRad(x) { return angleMode === "DEG" ? x * Math.PI / 180 : x; }
    function fromRad(x) { return angleMode === "DEG" ? x * 180 / Math.PI : x; }

    function sanitizeAndCompute(raw) {
      let s = raw;

      s = s.replace(/mod/g, "%");

      // percentages: treat number% as /100
      s = s.replace(/(\d+(\.\d+)?)%/g, "($1/100)");

      // factorial n!
      while (/\d+(\.\d+)?!/.test(s)) {
        s = s.replace(/(\d+(\.\d+)?)!/g, (_, a) => {
          const n = Number(a);
          return String(factorial(n));
        });
      }

      // function calls
      const fnMap = {
        "sin(": x => Math.sin(toRad(x)),
        "cos(": x => Math.cos(toRad(x)),
        "tan(": x => Math.tan(toRad(x)),
        "asin(": x => fromRad(Math.asin(x)),
        "acos(": x => fromRad(Math.acos(x)),
        "atan(": x => fromRad(Math.atan(x)),
        "ln(": x => Math.log(x),
        "log(": x => Math.log10(x),
        "sqrt(": x => Math.sqrt(x)
      };

      function evalFunctions(str) {
        let changed = true;
        while (changed) {
          changed = false;
          for (const token in fnMap) {
            const idx = str.lastIndexOf(token);
            if (idx !== -1) {
              let start = idx + token.length;
              let depth = 1;
              let i = start;
              for (; i < str.length; i++) {
                if (str[i] === "(") depth++;
                else if (str[i] === ")") depth--;
                if (depth === 0) break;
              }
              if (i >= str.length) throw new Error("Mismatched parentheses");
              const inside = str.slice(start, i);
              const val = computeExpression(inside);
              const out = fnMap[token](val);
              if (!Number.isFinite(out)) throw new Error("Math error");
              str = str.slice(0, idx) + out + str.slice(i + 1);
              changed = true;
            }
          }
        }
        return str;
      }

      function computeExpression(str) {
        str = str.replace(/π/g, String(Math.PI))
                 .replace(/\be\b/g, String(Math.E))
                 .replace(/\bANS\b/g, String(lastAns));

        str = evalFunctions(str);

        // safe eval for math-only characters
        if (!/^[0-9+\-*/%.()^\sEe]+$/.test(str)) throw new Error("Invalid input");
        str = str.replace(/\^/g, "**");

        const val = Function('"use strict"; return (' + str + ')')();
        if (!Number.isFinite(val)) throw new Error("Math error");
        return val;
      }

      return computeExpression(s);
    }

    function prettify(n) {
      if (!Number.isFinite(n)) return "Error";
      return Number(n.toFixed(12)).toString();
    }

    function pushHistory(exp, result) {
      history.unshift({ exp, result });
      if (history.length > 30) history.pop();
      renderHistory();
    }

    function renderHistory() {
      historyList.innerHTML = "";
      history.forEach(item => {
        const div = document.createElement("div");
        div.className = "h-item";
        div.innerHTML = `<div style="color:#94a3b8;font-size:.8rem">${item.exp}</div><div style="font-weight:700">${item.result}</div>`;
        div.onclick = () => {
          expr = String(item.result);
          exprView.textContent = item.exp + " =";
          setDisplay(item.result);
        };
        historyList.appendChild(div);
      });
    }

    function applyFunction(fn) {
      if (fn === "pi") return addToExpr("π");
      if (fn === "e") return addToExpr("e");
      if (fn === "rand") return addToExpr(String(Math.random().toFixed(8)));
      if (fn === "square") return addToExpr("^2");
      if (fn === "fact") return addToExpr("!");
      if (fn === "neg") return addToExpr("(-");
      addToExpr(fn + "(");
    }

    function doEquals() {
      if (!expr.trim()) return;
      try {
        const val = sanitizeAndCompute(expr);
        const result = prettify(val);
        pushHistory(expr, result);
        exprView.textContent = expr + " =";
        expr = result;
        lastAns = Number(result);
        setDisplay(result);
      } catch (e) {
        setDisplay("Error");
      }
    }

    document.querySelectorAll("[data-action]").forEach(btn => {
      btn.addEventListener("click", () => {
        const a = btn.dataset.action;
        if (a === "clear") clearAll();
        else if (a === "del") delOne();
        else if (a === "equals") doEquals();
        else if (a === "ans") addToExpr("ANS");
        else if (a === "mc") memory = 0;
        else if (a === "mr") addToExpr(String(memory));
        else if (a === "mplus") {
          try { memory += sanitizeAndCompute(expr || display.value || "0"); } catch {}
        }
        else if (a === "mminus") {
          try { memory -= sanitizeAndCompute(expr || display.value || "0"); } catch {}
        }
      });
    });

    keys.addEventListener("click", (e) => {
      const b = e.target.closest("button");
      if (!b) return;
      if (b.dataset.char) addToExpr(b.dataset.char);
      if (b.dataset.op) addToExpr(b.dataset.op);
      if (b.dataset.fn) applyFunction(b.dataset.fn);
    });

    window.addEventListener("keydown", (e) => {
      const k = e.key;
      if (/^[0-9]$/.test(k)) addToExpr(k);
      else if (["+", "-", "*", "/", "(", ")", ".", "%", "^"].includes(k)) addToExpr(k);
      else if (k === "Enter") { e.preventDefault(); doEquals(); }
      else if (k === "Backspace") delOne();
      else if (k === "Escape") clearAll();
    });
  </script>
</body>
</html>
