<body>
    <h1>Sample Add</h1>
    <button onclick="add(40, 30)">Add</button>

    

    <script>
        function add(a, b) {
            var res = a + b;
            alert("Result: " + res);
        }
        
        var num1=20;
        var num2 = 30;
        var res;
        res =num1-num2
        alert(res)
        res =num1+num2
        alert(res)
        res =num1/num2
        alert(res)

    </script>
