<!DOCTYPE html>
<html>
<head>
    <style>
        ul {
            list-style-type: none; /* Remove default styling */
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* Add three columns */
            padding: 12px;
            text-align: center;
        }
        li {
            padding: 10px;
        }
    </style>
</head>
<body>

    <ul>
        <li>
            <a href="productDetail.html"><img src="shoe101.jpg" alt="XYZ Shoe"></a>
            <p>XYZ Shoe</p>
        </li>
        <li>
            <img src="shoe102.jpg" alt="ABC Shoe">
            <p>ABC Shoe</p>
        </li>
        <li>
            <img src="pqr_image.jpg" alt="PQR Shoe">
            <p>PQR Shoe</p>
        </li>
        <li>
            <video width="200" controls>
                <source src="mno_video.mp4" type="video/mp4">
            </video>
            <p>MNO Shoe</p>
        </li>
    </ul>

</body>
</html>
